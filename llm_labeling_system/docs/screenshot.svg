<svg viewBox="0 0 1200 980" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Inter, ui-sans-serif, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef0fe"/>
      <stop offset="55%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f52e0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1c2230" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="980" fill="#f4f5fa"/>

  <!-- Header / toolbar -->
  <rect x="16" y="16" width="1168" height="120" rx="14" fill="url(#headerGrad)" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="48" y="66" font-size="26" font-weight="700" fill="#1c2230">Manual Driving Labeling</text>
  <text x="48" y="92" font-size="14" fill="#6b7288">Create a session from a GPS file, then AI-scan it and label each flagged window from a human perspective.</text>
  <g font-size="14" font-weight="650">
    <rect x="808" y="52" width="104" height="40" rx="10" fill="none" stroke="#e2e5ef"/>
    <text x="828" y="77" fill="#6b7288">⚙ Settings</text>
    <rect x="924" y="52" width="86" height="40" rx="10" fill="none" stroke="#e2e5ef"/>
    <text x="944" y="77" fill="#6b7288">☾ Dark</text>
    <rect x="1022" y="52" width="122" height="40" rx="10" fill="#6366f1"/>
    <text x="1044" y="77" fill="#ffffff">Export CSV</text>
  </g>

  <!-- New Session + Session panels -->
  <rect x="16" y="152" width="700" height="220" rx="14" fill="#ffffff" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="40" y="184" font-size="15" font-weight="700" fill="#1c2230">1. New Session</text>
  <text x="652" y="184" font-size="12" fill="#6b7288" text-anchor="end">No file loaded</text>
  <line x1="16" y1="200" x2="716" y2="200" stroke="#e2e5ef"/>
  <g fill="none" stroke="#e2e5ef">
    <rect x="40" y="220" width="636" height="40" rx="10"/>
    <rect x="40" y="276" width="300" height="40" rx="10"/>
    <rect x="376" y="276" width="300" height="40" rx="10"/>
  </g>
  <rect x="40" y="332" width="150" height="34" rx="10" fill="#6366f1"/>
  <text x="62" y="354" font-size="13" font-weight="650" fill="#ffffff">Create Session</text>

  <rect x="732" y="152" width="452" height="220" rx="14" fill="#ffffff" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="756" y="184" font-size="15" font-weight="700" fill="#1c2230">Session</text>
  <text x="1160" y="184" font-size="12" fill="#6b7288" text-anchor="end">gps_cleared.csv · 49049 rows</text>
  <line x1="732" y1="200" x2="1184" y2="200" stroke="#e2e5ef"/>
  <rect x="756" y="220" width="300" height="40" rx="10" fill="none" stroke="#e2e5ef"/>
  <text x="772" y="245" font-size="13" font-weight="650" fill="#1c2230">gps_cleared.csv — 3/500 labeled</text>
  <rect x="1068" y="220" width="92" height="40" rx="10" fill="none" stroke="#e2e5ef"/>
  <text x="1088" y="245" font-size="13" font-weight="650" fill="#6b7288">Delete</text>
  <rect x="756" y="292" width="404" height="10" rx="5" fill="#e8eaf3"/>
  <rect x="756" y="292" width="3" height="10" rx="5" fill="url(#progressGrad)"/>
  <text x="756" y="322" font-size="13" fill="#6b7288">3 / 500 labeled</text>

  <!-- AI Scan panel -->
  <rect x="16" y="392" width="1168" height="380" rx="14" fill="#ffffff" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="40" y="424" font-size="15" font-weight="700" fill="#1c2230">2. AI Scan</text>
  <text x="1160" y="424" font-size="12" fill="#6b7288" text-anchor="end">382 flagged from a previous scan</text>
  <line x1="16" y1="440" x2="1184" y2="440" stroke="#e2e5ef"/>

  <rect x="40" y="462" width="150" height="40" rx="10" fill="#6366f1"/>
  <text x="62" y="487" font-size="13" font-weight="650" fill="#ffffff">Run AI Scan</text>
  <rect x="204" y="462" width="96" height="40" rx="10" fill="none" stroke="#e2e5ef"/>
  <text x="228" y="487" font-size="13" font-weight="650" fill="#c7cad6">Cancel</text>
  <rect x="316" y="474" width="16" height="16" rx="4" fill="none" stroke="#e2e5ef"/>
  <text x="342" y="487" font-size="13" fill="#1c2230">Use offline mock suggestions (no API key)</text>
  <rect x="672" y="470" width="150" height="24" rx="12" fill="#e8f8f1"/>
  <text x="694" y="487" font-size="12" font-weight="700" fill="#067a53">API key: configured</text>
  <rect x="1028" y="462" width="156" height="40" rx="10" fill="#eef0fe"/>
  <text x="1050" y="487" font-size="13" font-weight="650" fill="#6366f1">Export AI CSV</text>

  <rect x="40" y="524" width="1144" height="10" rx="5" fill="#e8eaf3"/>
  <rect x="40" y="524" width="1144" height="10" rx="5" fill="url(#progressGrad)"/>
  <text x="40" y="554" font-size="13" fill="#6b7288">500 / 500 scanned</text>

  <!-- results table -->
  <rect x="40" y="574" width="1144" height="176" rx="10" fill="#ffffff" stroke="#e2e5ef"/>
  <rect x="40" y="574" width="1144" height="30" fill="#f4f5fa"/>
  <g font-size="12" font-weight="700" fill="#6b7288">
    <text x="56" y="594">#</text>
    <text x="100" y="594">AI label</text>
    <text x="280" y="594">Risk</text>
    <text x="400" y="594">Confidence</text>
    <text x="520" y="594">Reason</text>
  </g>
  <g font-size="12" fill="#1c2230">
    <text x="56" y="626">11</text>
    <rect x="92" y="612" width="128" height="22" rx="11" fill="#fdefee"/>
    <text x="104" y="627" fill="#c22d22" font-weight="700">harsh_accel_brake</text>
    <rect x="280" y="612" width="70" height="22" rx="11" fill="#fdf4e3"/>
    <text x="294" y="627" fill="#b05408" font-weight="700">medium</text>
    <text x="400" y="627">70%</text>
    <text x="520" y="627" fill="#6b7288">A single large speed change happened quickly.</text>

    <text x="56" y="660">12</text>
    <rect x="92" y="646" width="80" height="22" rx="11" fill="#eef0f6"/>
    <text x="104" y="661" fill="#565d73" font-weight="700">unclear</text>
    <rect x="280" y="646" width="80" height="22" rx="11" fill="#eef0f6"/>
    <text x="294" y="661" fill="#565d73" font-weight="700">unclear</text>
    <text x="400" y="661">40%</text>
    <text x="520" y="661" fill="#6b7288">The window shows weak or conflicting evidence.</text>

    <text x="56" y="694">19</text>
    <rect x="92" y="680" width="128" height="22" rx="11" fill="#fdefee"/>
    <text x="104" y="695" fill="#c22d22" font-weight="700">harsh_accel_brake</text>
    <rect x="280" y="680" width="70" height="22" rx="11" fill="#fdf4e3"/>
    <text x="294" y="695" fill="#b05408" font-weight="700">medium</text>
    <text x="400" y="695">61%</text>
    <text x="520" y="695" fill="#6b7288">Multiple brake signals appear in a short window.</text>

    <text x="56" y="728">42</text>
    <rect x="92" y="714" width="120" height="22" rx="11" fill="#fdefee"/>
    <text x="104" y="729" fill="#c22d22" font-weight="700">zigzag_unstable</text>
    <rect x="280" y="714" width="70" height="22" rx="11" fill="#fdf4e3"/>
    <text x="294" y="729" fill="#b05408" font-weight="700">medium</text>
    <text x="400" y="729">64%</text>
    <text x="520" y="729" fill="#6b7288">Heading changes are large across the window.</text>
  </g>

  <!-- Current Window + Label form -->
  <rect x="16" y="788" width="700" height="176" rx="14" fill="#ffffff" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="40" y="820" font-size="15" font-weight="700" fill="#1c2230">Current Window</text>
  <text x="652" y="820" font-size="12" fill="#6b7288" text-anchor="end">4 / 500</text>
  <line x1="16" y1="836" x2="716" y2="836" stroke="#e2e5ef"/>
  <g fill="#f4f5fa" stroke="#e2e5ef">
    <rect x="40" y="856" width="150" height="70" rx="10"/>
    <rect x="204" y="856" width="150" height="70" rx="10"/>
    <rect x="368" y="856" width="150" height="70" rx="10"/>
    <rect x="532" y="856" width="150" height="70" rx="10"/>
  </g>
  <g font-size="11" font-weight="650" fill="#6b7288">
    <text x="56" y="876">Max GPS speed</text>
    <text x="220" y="876">Avg GPS speed</text>
    <text x="384" y="876">Speed delta</text>
    <text x="548" y="876">Brake count</text>
  </g>
  <g font-size="16" font-weight="700" fill="#1c2230">
    <text x="56" y="904">93 km/h</text>
    <text x="220" y="904">77.1 km/h</text>
    <text x="384" y="904">-27 km/h</text>
    <text x="548" y="904">1</text>
  </g>

  <rect x="732" y="788" width="452" height="176" rx="14" fill="#ffffff" stroke="#e2e5ef" filter="url(#soft)"/>
  <text x="756" y="820" font-size="15" font-weight="700" fill="#1c2230">3. Label This Window</text>
  <text x="1160" y="820" font-size="12" fill="#6b7288" text-anchor="end">Not saved</text>
  <line x1="732" y1="836" x2="1184" y2="836" stroke="#e2e5ef"/>
  <g fill="none" stroke="#e2e5ef">
    <rect x="756" y="856" width="200" height="36" rx="10"/>
    <rect x="964" y="856" width="200" height="36" rx="10"/>
    <rect x="756" y="900" width="200" height="36" rx="10"/>
  </g>
  <circle cx="774" cy="874" r="6" fill="none" stroke="#6b7288"/>
  <text x="792" y="879" font-size="12" fill="#1c2230">Normal</text>
  <circle cx="982" cy="874" r="6" fill="#6366f1"/>
  <text x="1000" y="879" font-size="12" fill="#6366f1" font-weight="650">Harsh accel/braking</text>
  <circle cx="774" cy="918" r="6" fill="none" stroke="#6b7288"/>
  <text x="792" y="923" font-size="12" fill="#1c2230">Zigzag / unstable</text>
  <rect x="964" y="900" width="220" height="36" rx="10" fill="#6366f1"/>
  <text x="1010" y="923" font-size="13" font-weight="650" fill="#ffffff">Save And Next</text>
</svg>
